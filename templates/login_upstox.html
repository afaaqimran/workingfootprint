<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afaaqs Foot Print Server</title>
    
    <!-- Design System CSS -->
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/components.css">
    
    <style>
        body {
            background: linear-gradient(135deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-inter);
        }

        .wrapper {
            display: flex;
            width: 100%;
            max-width: 820px;
            min-height: 520px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
        }

        /* Left panel */
        .left {
            width: 42%;
            background: linear-gradient(180deg, rgba(38, 166, 154, 0.1) 0%, rgba(38, 166, 154, 0.05) 100%);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--color-border);
        }

        .left h1 {
            font-size: var(--font-size-h1);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .left p {
            font-size: var(--font-size-body);
            color: var(--color-text-secondary);
            line-height: var(--line-height-relaxed);
        }

        /* Right panel */
        .right {
            width: 58%;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        .field-label {
            display: block;
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-medium);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .field-input {
            width: 100%;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-size: var(--font-size-body);
            padding: 10px var(--spacing-md);
            outline: none;
            transition: all var(--transition-normal);
            font-family: var(--font-inter);
        }

        .field-input:focus { 
            border-color: var(--color-focus);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        .field-input::placeholder { 
            color: var(--color-text-tertiary);
        }

        .login-btn {
            width: 100%;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 11px var(--spacing-lg);
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-bold);
            cursor: pointer;
            transition: all var(--transition-normal);
            letter-spacing: 0.5px;
            margin-top: var(--spacing-lg);
        }

        .login-btn:hover { 
            background: #20897d;
            transform: translateY(-1px);
        }
        
        .login-btn:disabled { 
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .warning-text {
            font-size: var(--font-size-small);
            color: var(--color-warning);
            margin-top: var(--spacing-sm);
            line-height: var(--line-height-relaxed);
        }

        .status-msg {
            margin-top: var(--spacing-sm);
            font-size: var(--font-size-small);
            display: none;
        }
        .status-msg.error   { color: var(--color-danger); }
        .status-msg.success { color: var(--color-success); }

        .bottom-note {
            font-size: var(--font-size-small);
            color: var(--color-text-tertiary);
            padding-top: var(--spacing-xl);
        }

        /* Right panel */
        .right {
            width: 58%;
            background: linear-gradient(135deg, rgba(38, 166, 154, 0.05) 0%, rgba(38, 166, 154, 0.02) 100%);
            border-left: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            position: relative;
            overflow: hidden;
        }

        .right svg { 
            width: 100%; 
            max-width: 340px; 
            opacity: 0.85;
        }

        .right-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin-top: var(--spacing-xl);
            letter-spacing: -0.5px;
        }

        .right-sub {
            font-size: var(--font-size-body);
            color: var(--color-text-secondary);
            margin-top: var(--spacing-md);
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(38, 166, 154, 0.2);
        }

        @media (max-width: 640px) {
            .wrapper { flex-direction: column; width: 95%; }
            .left, .right { width: 100%; }
            .right { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <!-- Left: Form -->
    <div class="left">
        <div>
            <h1>Login</h1>

            <form id="loginForm">
                <button type="submit" class="login-btn" id="loginBtn">Login</button>

                <div class="status-msg error"   id="errorMessage"></div>
                <div class="status-msg success" id="successMessage"></div>

                <p class="warning-text">⚠ Restricted Access — Any unauthorized access will be logged and blacklisted.</p>
            </form>
        </div>

        <div class="bottom-note">Afaaqs Foot Print Server &nbsp;·&nbsp; Upstox Market Data</div>
    </div>

    <!-- Right: Illustration -->
    <div class="right">
        <div class="dot" style="width:6px;height:6px;top:12%;left:18%;"></div>
        <div class="dot" style="width:4px;height:4px;top:20%;left:70%;"></div>
        <div class="dot" style="width:5px;height:5px;top:55%;left:85%;"></div>
        <div class="dot" style="width:3px;height:3px;top:75%;left:25%;"></div>
        <div class="dot" style="width:6px;height:6px;top:30%;left:55%;"></div>

        <svg viewBox="0 0 300 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- clouds -->
            <ellipse cx="150" cy="295" rx="55" ry="18" fill="#dce8f0"/>
            <ellipse cx="110" cy="290" rx="35" ry="14" fill="#dce8f0"/>
            <ellipse cx="190" cy="290" rx="35" ry="14" fill="#dce8f0"/>
            <ellipse cx="150" cy="285" rx="65" ry="20" fill="#e8f0f7"/>
            <!-- rocket body -->
            <path d="M150 60 C130 80 122 130 122 180 L178 180 C178 130 170 80 150 60Z" stroke="#1e2a3a" stroke-width="2" fill="white"/>
            <!-- nose -->
            <path d="M150 30 C140 45 130 60 130 70 L170 70 C170 60 160 45 150 30Z" stroke="#1e2a3a" stroke-width="2" fill="white"/>
            <!-- window -->
            <circle cx="150" cy="120" r="14" stroke="#1e2a3a" stroke-width="2" fill="#e8f4f8"/>
            <circle cx="150" cy="120" r="8"  stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <!-- fins -->
            <path d="M122 160 L95 195 L122 185Z" stroke="#1e2a3a" stroke-width="2" fill="white"/>
            <path d="M178 160 L205 195 L178 185Z" stroke="#1e2a3a" stroke-width="2" fill="white"/>
            <!-- exhaust -->
            <path d="M135 180 Q130 210 138 230 Q150 245 162 230 Q170 210 165 180Z" stroke="#1e2a3a" stroke-width="1.5" fill="#f0f4f8"/>
            <!-- planet -->
            <circle cx="240" cy="60" r="22" stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <path d="M220 55 Q240 48 260 55" stroke="#1e2a3a" stroke-width="1.5" fill="none"/>
            <!-- satellite -->
            <rect x="48" y="75" width="18" height="10" rx="2" stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <line x1="38" y1="80" x2="48" y2="80" stroke="#1e2a3a" stroke-width="1.5"/>
            <line x1="66" y1="80" x2="76" y2="80" stroke="#1e2a3a" stroke-width="1.5"/>
            <rect x="30" y="76" width="8" height="8" rx="1" stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <rect x="76" y="76" width="8" height="8" rx="1" stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <!-- comet -->
            <circle cx="68" cy="155" r="7" stroke="#1e2a3a" stroke-width="1.5" fill="white"/>
            <path d="M75 148 Q95 138 115 132" stroke="#1e2a3a" stroke-width="1.5" stroke-dasharray="3 3"/>
        </svg>

        <div class="right-title">Afaaqs Foot Print Server</div>
        <div class="right-sub">Real-time market footprint analytics</div>
    </div>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const loginBtn   = document.getElementById('loginBtn');
        const errorMsg   = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Connecting...';

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
            const result = await response.json();
            if (result.success) {
                successMsg.textContent = '✓ ' + result.message;
                successMsg.style.display = 'block';
                if (result.warning) {
                    const w = document.createElement('div');
                    w.style.cssText = 'margin-top:10px;padding:8px 12px;background:rgba(210,153,34,0.15);border:1px solid rgba(210,153,34,0.4);border-radius:6px;color:#d29922;font-size:0.78rem;';
                    w.textContent = result.warning;
                    document.getElementById('loginForm').appendChild(w);
                    setTimeout(() => { window.location.href = '/'; }, 4000);
                } else {
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                }
            } else {
                errorMsg.textContent = result.message;
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent = 'Connection error: ' + err.message;
            errorMsg.style.display = 'block';
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    });
</script>
</body>
</html>
