<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footprint Charts - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #131722; color: #d1d4dc; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background: #2B2B43; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { font-size: 24px; margin-bottom: 8px; }
        .login-header p { color: #888; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px;
            background: #1a1a2e; color: #d1d4dc; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #26a69a; }
        .login-btn {
            width: 100%; padding: 12px; background: #26a69a; color: white;
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
        }
        .login-btn:hover { background: #229a8a; }
        .login-btn:disabled { background: #444; cursor: not-allowed; }
        .error-msg { color: #ef5350; font-size: 14px; margin-top: 10px; }
        .success-msg { color: #26a69a; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📊 Footprint Charts</h1>
            <p>Login with your Shoonya credentials</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="userid">User ID</label>
                <input type="text" id="userid" name="userid" value="FA156632" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="Oct@2025" required>
            </div>
            
            <div class="form-group">
                <label for="twoFA">TOTP Secret or 6-digit Code</label>
                <input type="text" id="twoFA" name="twoFA" required placeholder="Enter TOTP secret or 6-digit code">
            </div>
            
            <div class="form-group">
                <label for="vendor_code">Vendor Code</label>
                <input type="text" id="vendor_code" name="vendor_code" value="FA156632_U" required>
            </div>
            
            <div class="form-group">
                <label for="api_secret">API Secret</label>
                <input type="password" id="api_secret" name="api_secret" value="11a7d10644e73ee8cc7e036fd8a3ac39" required>
            </div>
            
            <div class="form-group">
                <label for="imei">IMEI (Optional)</label>
                <input type="text" id="imei" name="imei" value="abc1234">
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            <div id="message"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const message = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            message.innerHTML = '';
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    message.innerHTML = '<div class="success-msg">Login successful! Redirecting...</div>';
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    message.innerHTML = `<div class="error-msg">${result.message}</div>`;
                }
            } catch (error) {
                message.innerHTML = '<div class="error-msg">Network error. Please try again.</div>';
            }
            
            btn.disabled = false;
            btn.textContent = 'Login';
        });
    </script>
</body>
</html>
